<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoPlayground Content Inserter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#4f46e5',
            darkBackground: '#0f172a',
            surface: '#1e293b'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .input-field {
      background-color: #334155;
      border: 1px solid #475569;
      color: #f8fafc;
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.2s;
      width: 100%;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
    }
  </style>
</head>

<body class="min-h-screen p-8">

  <div class="max-w-4xl mx-auto">
    <header class="mb-10 text-center">
      <h1
        class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">
        Algorithm Content Inserter</h1>
      <p class="text-slate-400">Add Quizzes and Exercises to your database easily.</p>
    </header>

    <div class="glass-panel rounded-2xl p-6 md:p-8">

      <!-- Top Tabs (Quiz vs Exercise) -->
      <div class="flex space-x-2 mb-8 bg-slate-800 p-1 rounded-xl">
        <button id="tabQuiz" onclick="switchMainTab('quiz')"
          class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow">Quiz
          Question</button>
        <button id="tabExercise" onclick="switchMainTab('exercise')"
          class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white">Exercise</button>
      </div>

      <!-- Mode Tabs (Single vs Bulk) -->
      <div class="flex space-x-4 mb-6 border-b border-slate-700 pb-2">
        <button id="modeSingle" onclick="switchMode('single')"
          class="text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all">Single Form</button>
        <button id="modeBulk" onclick="switchMode('bulk')"
          class="text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200">Bulk JSON</button>
      </div>

      <!-- Content Area -->
      <div id="contentArea">
        <!-- Renders dynamically -->
      </div>

    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast"
    class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium pointer-events-none z-50">
    Operation successful!
  </div>

  <script>
    // Configuration & Data
    const API_BASE = "http://localhost:8080";
    const AUTH_TOKEN = "test-token";

    // Data from Catalog
    const algorithms = [
      { id: "linear-ds", title: "Linear DS", slugs: ["array", "doubly-linked-list", "singly-linked-list", "stack", "queue"] },
      { id: "tree", title: "Tree", slugs: ["binary-tree-inorder", "binary-tree-preorder", "binary-tree-postorder", "binary-search-tree", "avl-tree", "min-heap", "max-heap"] },
      { id: "graph", title: "Graph", slugs: ["breadth-first-search", "depth-first-search", "dijkstra", "bellman-ford", "prims", "kruskals"] },
      { id: "sorting", title: "Sorting", slugs: ["bubble-sort", "selection-sort", "insertion-sort", "merge-sort", "queue-sort"] },
      { id: "searching", title: "Searching", slugs: ["linear-search", "binary-search"] },
    ];

    let currentMainTab = 'quiz'; // 'quiz' | 'exercise'
    let currentMode = 'single'; // 'single' | 'bulk'
    let currentQuizType = 'multiple_choice'; // 'multiple_choice' | 'ordering' | 'fill_blank'
    let orderItemsCount = 4; // default for ordering

    // Init
    window.onload = () => render();

    function switchMainTab(tab) {
      currentMainTab = tab;
      document.getElementById('tabQuiz').className = tab === 'quiz' ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow' : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
      document.getElementById('tabExercise').className = tab === 'exercise' ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow' : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
      render();
    }

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('modeSingle').className = mode === 'single' ? 'text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all' : 'text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200';
      document.getElementById('modeBulk').className = mode === 'bulk' ? 'text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all' : 'text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200';
      render();
    }

    function switchQuizType(type) {
      currentQuizType = type;
      render();
    }

    function changeOrderItemsCount(change) {
      const newCount = Math.max(2, orderItemsCount + change);
      if (newCount === orderItemsCount) return;

      const container = document.getElementById('orderItemsContainer');
      if (!container) {
        orderItemsCount = newCount;
        render();
        return;
      }

      if (newCount > orderItemsCount) {
        for (let i = orderItemsCount; i < newCount; i++) {
          const div = document.createElement('div');
          div.className = "flex items-center space-x-3";
          div.id = `orderRow_${i}`;
          div.innerHTML = `
            <span class="text-slate-400 font-mono">${i + 1}.</span>
            <input type="text" id="order_${i}" class="input-field" placeholder="Item ${i + 1}">
          `;
          container.appendChild(div);
        }
      } else {
        for (let i = orderItemsCount - 1; i >= newCount; i--) {
          const row = document.getElementById(`orderRow_${i}`);
          if (row) row.remove();
        }
      }
      orderItemsCount = newCount;
    }

    function render() {
      const area = document.getElementById('contentArea');

      if (currentMode === 'bulk') {
        area.innerHTML = `
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Paste JSON Array of ${currentMainTab === 'quiz' ? 'Quizzes' : 'Exercises'}</label>
            <textarea id="bulkData" rows="12" class="input-field font-mono text-sm" placeholder="[\n  { ... }\n]"></textarea>
            <div class="mt-6">
              <button onclick="submitBulk()" class="btn-primary">Submit Batch</button>
            </div>
          </div>
        `;
        return;
      }

      // Single Form Rendering
      if (currentMainTab === 'quiz') {
        // Build Algorithm options
        let algoOptions = "";
        algorithms.forEach(g => {
          algoOptions += `<optgroup label="${g.title}">`;
          g.slugs.forEach(s => {
            algoOptions += `<option value="${s}">${s}</option>`;
          });
          algoOptions += `</optgroup>`;
        });

        area.innerHTML = `
          <div class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Algorithm</label>
                <select id="q_algo" class="input-field">${algoOptions}</select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Type of Quiz</label>
                <select id="q_typeQuiz" class="input-field">
                  <option value="pretest">Pre-Test</option>
                  <option value="posttest">Post-Test</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Question Type</label>
                <select id="q_questionType" class="input-field" onchange="switchQuizType(this.value)">
                  <option value="multiple_choice" ${currentQuizType === 'multiple_choice' ? 'selected' : ''}>Multiple Choice</option>
                  <option value="ordering" ${currentQuizType === 'ordering' ? 'selected' : ''}>Ordering</option>
                  <option value="fill_blank" ${currentQuizType === 'fill_blank' ? 'selected' : ''}>Fill in the Blank</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Title / Question Text</label>
              <input type="text" id="q_title" class="input-field" placeholder="What is the time complexity of...">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Question Image URL (Optional)</label>
              <input type="text" id="q_image" class="input-field" placeholder="https://example.com/image.png">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Question Context (Optional Info/Code View)</label>
              <textarea id="q_desc" rows="2" class="input-field" placeholder="Provide extra description if needed..."></textarea>
            </div>

            ${currentQuizType === 'multiple_choice' ? `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <label class="block text-sm font-medium text-white">Choices (Select correct one with radio)</label>
                
                ${[0, 1, 2, 3].map(i => `
                  <div class="flex items-center space-x-3">
                    <input type="radio" name="correctChoice" value="${i}" ${i === 0 ? 'checked' : ''} class="w-5 h-5 text-indigo-600 bg-slate-700 border-slate-600 focus:ring-indigo-500 focus:ring-2">
                    <input type="text" id="choice_${i}" class="input-field" placeholder="Choice ${i + 1}">
                  </div>
                `).join('')}
              </div>
            ` : currentQuizType === 'fill_blank' ? `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <label class="block text-sm font-medium text-white">Fill in the Blank Answer</label>
                <input type="text" id="fill_answer" class="input-field" placeholder="Correct Answer (e.g. O(n))">
                <p class="text-xs text-slate-400">The user must type exactly this answer (case-insensitive checking usually).</p>
              </div>
            ` : `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <div class="flex justify-between items-center">
                  <label class="block text-sm font-medium text-white">Ordering Items (Input in correct order)</label>
                  <div class="space-x-2">
                    <button type="button" onclick="changeOrderItemsCount(-1)" class="text-slate-400 hover:text-white px-2 py-1 bg-slate-700 rounded">-</button>
                    <button type="button" onclick="changeOrderItemsCount(1)" class="text-slate-400 hover:text-white px-2 py-1 bg-slate-700 rounded">+</button>
                  </div>
                </div>
                
                <div id="orderItemsContainer" class="space-y-4">
                ${Array.from({ length: orderItemsCount }).map((_, i) => `
                  <div class="flex items-center space-x-3" id="orderRow_${i}">
                    <span class="text-slate-400 font-mono">${i + 1}.</span>
                    <input type="text" id="order_${i}" class="input-field" placeholder="Item ${i + 1}">
                  </div>
                `).join('')}
                </div>
                <p class="text-xs text-slate-400">The frontend will display these randomly to users. Your order here is the correct answer.</p>
              </div>
            `}

            <div class="mt-6">
              <button onclick="submitSingleQuiz()" class="btn-primary">Add Single Quiz Question</button>
            </div>
          </div>
        `;
      } else {
        // Exercise Single Form
        area.innerHTML = `
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
              <input type="text" id="e_title" class="input-field" placeholder="e.g. Find the Middle Node">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Difficulty</label>
                <select id="e_diff" class="input-field">
                  <option value="Easy">Easy</option>
                  <option value="Medium">Medium</option>
                  <option value="Hard">Hard</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
              <textarea id="e_desc" rows="3" class="input-field" placeholder="Describe the problem..."></textarea>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Requirement</label>
              <textarea id="e_req" rows="2" class="input-field" placeholder="What should the function return?"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Example</label>
              <textarea id="e_ex" rows="2" class="input-field font-mono" placeholder="Input: ... Output: ..."></textarea>
            </div>

            <!-- Dynamic Tips Section -->
            <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
              <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-medium text-white">Tips (Optional)</label>
                <button onclick="addTipField()" type="button" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium">+ Add Tip</button>
              </div>
              <div id="e_tips_container" class="space-y-4">
                <!-- Tips inject here -->
              </div>
              <p class="text-xs text-slate-500">e.g. Hint 1, Pseudo Code, Time Complexity</p>
            </div>

            <div class="mt-6">
              <button onclick="submitSingleExercise()" class="btn-primary">Add Single Exercise</button>
            </div>
          </div>
        `;

        // Auto-add the first tip field so it's ready to use
        addTipField();
      }
    }

    // Handlers
    async function submitSingleQuiz() {
      let questionData = {};

      if (currentQuizType === 'multiple_choice') {
        questionData = {
          choices: [0, 1, 2, 3].map(i => ({ label: document.getElementById(`choice_${i}`).value })),
          correctChoiceIndex: parseInt(document.querySelector('input[name="correctChoice"]:checked').value)
        };
      } else if (currentQuizType === 'fill_blank') {
        questionData = {
          correctAnswer: document.getElementById('fill_answer').value
        };
      } else if (currentQuizType === 'ordering') {
        const items = [];
        const correctOrder = [];
        for (let i = 0; i < orderItemsCount; i++) {
          const val = document.getElementById(`order_${i}`).value;
          items.push({ label: val });
          correctOrder.push({ label: val, position: i });
        }

        // Shuffle the items randomly
        for (let i = items.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }

        questionData = {
          items: items,
          correctOrder: correctOrder
        };
      }

      const q = {
        type: currentQuizType,
        algorithm: document.getElementById('q_algo').value,
        typeQuiz: document.getElementById('q_typeQuiz').value,
        title: document.getElementById('q_title').value,
        questionImage: document.getElementById('q_image').value,
        question: questionData
      };

      // Add context if it exists and is supported by backend (desc)
      const desc = document.getElementById('q_desc') ? document.getElementById('q_desc').value : "";
      if (desc) {
        q.description = desc; // Assuming "Q_desc" might map to something, else harmless
      }

      await sendRequest('/quiz/batch', [q]);
    }

    async function submitSingleExercise() {
      // Gather tips
      const tips = [];
      document.querySelectorAll('.tip-item').forEach(item => {
        const label = item.querySelector('.tip-label').value;
        const content = item.querySelector('.tip-content').value;
        if (label || content) {
          tips.push({ label, content });
        }
      });

      if (tips.length === 0) {
        showToast("Please add at least 1 tip.", true);
        return;
      }

      const e = {
        title: document.getElementById('e_title').value,
        difficulty: document.getElementById('e_diff').value,
        description: document.getElementById('e_desc').value,
        requirement: document.getElementById('e_req').value,
        example: document.getElementById('e_ex').value,
        tips: tips
      };

      await sendRequest('/exercise/batch', [e]);
    }

    function addTipField() {
      const container = document.getElementById('e_tips_container');
      const div = document.createElement('div');
      div.className = "tip-item bg-slate-700 p-3 rounded-lg border border-slate-600 relative";
      div.innerHTML = `
        <button onclick="this.parentElement.remove()" type="button" class="absolute top-2 right-2 text-slate-400 hover:text-red-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="space-y-3 mt-4">
          <div>
            <input type="text" class="tip-label input-field !py-1 !text-sm" placeholder="Label (e.g. Hint 1 or Pseudo Code)">
          </div>
          <div>
            <textarea rows="2" class="tip-content input-field !py-1 !text-sm" placeholder="Tip content..."></textarea>
          </div>
        </div>
      `;
      container.appendChild(div);
    }

    async function submitBulk() {
      let data;
      try {
        data = JSON.parse(document.getElementById('bulkData').value);
        if (!Array.isArray(data)) throw new Error("Must be an array");
      } catch (err) {
        showToast("Invalid JSON format. Must be an array.", true);
        return;
      }

      const endpoint = currentMainTab === 'quiz' ? '/quiz/batch' : '/exercise/batch';
      await sendRequest(endpoint, data);
    }

    async function sendRequest(path, data) {
      try {
        const res = await fetch(API_BASE + path, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + AUTH_TOKEN
          },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }

        showToast("Success! Data inserted.");
        
        // Clear all text inputs and textareas after success
        const area = document.getElementById('contentArea');
        if (area) {
          const inputs = area.querySelectorAll('input[type="text"], textarea');
          inputs.forEach(input => input.value = '');
          
          // Reset multiple-choice radio button to default (first choice)
          const radios = area.querySelectorAll('input[type="radio"]');
          if (radios.length > 0) {
            radios[0].checked = true;
          }
        }
      } catch (err) {
        showToast("Error: " + err.message, true);
        console.error(err);
      }
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;

      if (isError) {
        toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium z-50";
      } else {
        toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium z-50";
      }

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        // Reset classes after animation
        setTimeout(() => toast.className = "fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium pointer-events-none z-50", 300);
      }, 3000);
    }
  </script>
</body>

</html>
