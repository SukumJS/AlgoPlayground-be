<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoPlayground Content Inserter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#4f46e5',
            darkBackground: '#0f172a',
            surface: '#1e293b'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .input-field {
      background-color: #334155;
      border: 1px solid #475569;
      color: #f8fafc;
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.2s;
      width: 100%;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
    }
  </style>
</head>

<body class="min-h-screen p-8">

  <div class="max-w-4xl mx-auto">
    <header class="mb-10 text-center">
      <h1
        class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">
        Algorithm Content Inserter</h1>
      <p class="text-slate-400">Add Quizzes and Exercises to your database easily.</p>
    </header>

    <div class="glass-panel rounded-2xl p-6 md:p-8">

      <!-- Top Tabs (Quiz vs Exercise) -->
      <div class="flex space-x-2 mb-8 bg-slate-800 p-1 rounded-xl">
        <button id="tabQuiz" onclick="switchMainTab('quiz')"
          class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow">Quiz
          Question</button>
        <button id="tabExercise" onclick="switchMainTab('exercise')"
          class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white">Exercise</button>
      </div>

      <!-- Mode Tabs (Single vs Bulk) -->
      <div class="flex space-x-4 mb-6 border-b border-slate-700 pb-2">
        <button id="modeSingle" onclick="switchMode('single')"
          class="text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all">Single Form</button>
        <button id="modeBulk" onclick="switchMode('bulk')"
          class="text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200">Bulk JSON</button>
      </div>

      <!-- Content Area -->
      <div id="contentArea">
        <!-- Renders dynamically -->
      </div>

    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast"
    class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium pointer-events-none z-50">
    Operation successful!
  </div>

  <script>
    // Configuration & Data
    const API_BASE = "http://localhost:8080";
    const AUTH_TOKEN = "test-token";

    // Data from Catalog
    const algorithms = [
      { id: "linear-ds", title: "Linear DS", slugs: ["array", "doubly-linked-list", "singly-linked-list", "stack", "queue"] },
      { id: "tree", title: "Tree", slugs: ["binary-tree-inorder", "binary-tree-preorder", "binary-tree-postorder", "binary-search-tree", "avl-tree", "min-heap", "max-heap"] },
      { id: "graph", title: "Graph", slugs: ["breadth-first-search", "depth-first-search", "dijkstra", "bellman-ford", "prims", "kruskals"] },
      { id: "sorting", title: "Sorting", slugs: ["bubble-sort", "selection-sort", "insertion-sort", "merge-sort", "queue-sort"] },
      { id: "searching", title: "Searching", slugs: ["linear-search", "binary-search"] },
    ];

    let currentMainTab = 'quiz'; // 'quiz' | 'exercise'
    let currentMode = 'single'; // 'single' | 'bulk'
    let currentQuizType = 'multiple_choice'; // 'multiple_choice' | 'ordering' | 'fill_blank'
    let orderItemsCount = 4; // default for ordering
    let canvasDragState = null;

    // Init
    window.onload = () => render();

    function switchMainTab(tab) {
      currentMainTab = tab;
      document.getElementById('tabQuiz').className = tab === 'quiz' ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow' : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
      document.getElementById('tabExercise').className = tab === 'exercise' ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-500 text-white shadow' : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
      render();
    }

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('modeSingle').className = mode === 'single' ? 'text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all' : 'text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200';
      document.getElementById('modeBulk').className = mode === 'bulk' ? 'text-indigo-400 font-medium border-b-2 border-indigo-400 pb-2 px-1 transition-all' : 'text-slate-400 font-medium pb-2 px-1 transition-all hover:text-slate-200';
      render();
    }

    function switchQuizType(type) {
      currentQuizType = type;
      render();
    }

    let canvasNodeCount = 0;
    let canvasEdgeCount = 0;

    function toggleCanvasSection() {
      const sel = document.getElementById('q_canvasType');
      const section = document.getElementById('canvasDataSection');
      const edgeHint = document.getElementById('edgeHint');
      if (sel && section) {
        section.style.display = sel.value === 'none' ? 'none' : 'block';
        // Update edge hint based on type
        if (edgeHint) {
          edgeHint.textContent = sel.value === 'tree'
            ? 'Tree: direction = which side the child is on (left/right of parent)'
            : 'Graph: weight = edge weight label (optional)';
        }
        // Re-render edges if switching type
        const container = document.getElementById('canvasEdgesContainer');
        if (container) {
          container.innerHTML = '';
          canvasEdgeCount = 0;
        }
      }
    }

    function attachCanvasToggle() {
      const sel = document.getElementById('q_canvasType');
      if (sel) {
        sel.addEventListener('change', toggleCanvasSection);
      }
      // Reset
      canvasNodeCount = 0;
      canvasEdgeCount = 0;
    }

    function addCanvasNode() {
      const container = document.getElementById('canvasNodesContainer');
      if (!container) return;
      const i = canvasNodeCount++;
      const div = document.createElement('div');
      div.className = "flex items-center space-x-2 canvas-node-row";
      div.id = `canvasNodeRow_${i}`;
      div.innerHTML = `
        <input type="text" id="cn_label_${i}" class="input-field !py-1 !text-sm" style="width:80px" placeholder="Label" oninput="updateCanvasPreview()">
        <span class="text-slate-500 text-xs">X:</span>
        <input type="number" id="cn_x_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="200" oninput="updateCanvasPreview()">
        <span class="text-slate-500 text-xs">Y:</span>
        <input type="number" id="cn_y_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="30" oninput="updateCanvasPreview()">
        <button type="button" onclick="this.parentElement.remove(); updateCanvasPreview();" class="text-slate-400 hover:text-red-400 text-sm px-1">✕</button>
      `;
      container.appendChild(div);
      updateCanvasPreview();
    }

    function addCanvasEdge() {
      const container = document.getElementById('canvasEdgesContainer');
      if (!container) return;
      const canvasType = document.getElementById('q_canvasType')?.value || 'tree';
      const i = canvasEdgeCount++;
      const div = document.createElement('div');
      div.className = "flex items-center space-x-2 canvas-edge-row";
      div.id = `canvasEdgeRow_${i}`;

      if (canvasType === 'tree') {
        div.innerHTML = `
          <span class="text-slate-500 text-xs shrink-0">From:</span>
          <input type="text" id="ce_src_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="10" oninput="updateCanvasPreview()">
          <span class="text-slate-500 text-xs shrink-0">→ To:</span>
          <input type="text" id="ce_tgt_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="5" oninput="updateCanvasPreview()">
          <select id="ce_dir_${i}" class="input-field !py-1 !text-sm" style="width:80px" onchange="updateCanvasPreview()">
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
          <button type="button" onclick="this.parentElement.remove(); updateCanvasPreview();" class="text-slate-400 hover:text-red-400 text-sm px-1">✕</button>
        `;
      } else {
        div.innerHTML = `
          <span class="text-slate-500 text-xs shrink-0">From:</span>
          <input type="text" id="ce_src_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="A" oninput="updateCanvasPreview()">
          <span class="text-slate-500 text-xs shrink-0">→ To:</span>
          <input type="text" id="ce_tgt_${i}" class="input-field !py-1 !text-sm" style="width:70px" placeholder="B" oninput="updateCanvasPreview()">
          <span class="text-slate-500 text-xs shrink-0">Weight:</span>
          <input type="text" id="ce_wt_${i}" class="input-field !py-1 !text-sm" style="width:50px" placeholder="5" oninput="updateCanvasPreview()">
          <button type="button" onclick="this.parentElement.remove(); updateCanvasPreview();" class="text-slate-400 hover:text-red-400 text-sm px-1">✕</button>
        `;
      }
      container.appendChild(div);
      updateCanvasPreview();
    }

    function buildCanvasData() {
      const canvasType = document.getElementById('q_canvasType')?.value;
      if (!canvasType || canvasType === 'none') return null;

      // Build nodes
      const nodes = [];
      const labelToNodeId = {};
      const duplicateNodeLabels = [];
      document.querySelectorAll('.canvas-node-row').forEach(row => {
        const label = row.querySelector('[id^="cn_label_"]')?.value?.trim();
        const x = parseInt(row.querySelector('[id^="cn_x_"]')?.value) || 0;
        const y = parseInt(row.querySelector('[id^="cn_y_"]')?.value) || 0;
        if (!label) return;
        const rowSuffix = (row.id || '').replace('canvasNodeRow_', '');
        const nodeId = 'n' + rowSuffix;
        if (labelToNodeId[label]) {
          duplicateNodeLabels.push(label);
        }
        labelToNodeId[label] = nodeId;
        nodes.push({
          id: nodeId,
          type: 'custom',
          data: { label: label, variant: 'circle' },
          position: { x, y }
        });
      });

      // Build edges
      const edges = [];
      const invalidEdges = [];
      document.querySelectorAll('.canvas-edge-row').forEach(row => {
        const src = row.querySelector('[id^="ce_src_"]')?.value?.trim();
        const tgt = row.querySelector('[id^="ce_tgt_"]')?.value?.trim();
        if (!src || !tgt) return;
        const srcId = labelToNodeId[src];
        const tgtId = labelToNodeId[tgt];
        if (!srcId || !tgtId) {
          invalidEdges.push({ from: src, to: tgt });
          return;
        }

        if (canvasType === 'tree') {
          const dir = row.querySelector('[id^="ce_dir_"]')?.value || 'left';
          edges.push({
            id: `e-${src}-${tgt}`,
            source: srcId,
            sourceHandle: dir === 'left' ? 'source-bottom-left' : 'source-bottom-right',
            target: tgtId,
            targetHandle: dir === 'left' ? 'target-top-right' : 'target-top-left',
            type: 'tree',
            style: { strokeWidth: 2, stroke: '#5D5D5D' }
          });
        } else {
          const wt = row.querySelector('[id^="ce_wt_"]')?.value?.trim() || '';
          const edge = {
            id: `eg-${src}-${tgt}`,
            source: srcId,
            target: tgtId,
            type: 'floatingEdge',
            style: { stroke: '#222121', strokeWidth: 1 },
            markerEnd: { type: 'arrowclosed', width: 25, height: 25, color: '#222121' }
          };
          if (wt) {
            edge.label = wt;
            edge.data = { weight: isNaN(Number(wt)) ? wt : Number(wt) };
          }
          edges.push(edge);
        }
      });

      return {
        canvasType,
        nodes,
        edges,
        _issues: {
          duplicateNodeLabels,
          invalidEdges,
        }
      };
    }

    function updateCanvasPreview() {
      // JSON preview
      const jsonPreview = document.getElementById('canvasJsonPreview');
      if (jsonPreview) {
        const data = buildCanvasData();
        const payloadPreview = data ? {
          canvasType: data.canvasType,
          nodes: data.nodes,
          edges: data.edges,
        } : null;
        jsonPreview.textContent = payloadPreview ? JSON.stringify(payloadPreview, null, 2) : '(no canvas data)';
      }
      // Visual SVG preview
      renderCanvasSvgPreview();
    }

    function renderCanvasSvgPreview() {
      const svg = document.getElementById('canvasPreviewSvg');
      const emptyMsg = document.getElementById('canvasPreviewEmpty');
      if (!svg) return;

      const canvasType = document.getElementById('q_canvasType')?.value || 'tree';

      // Collect nodes
      const nodes = [];
      document.querySelectorAll('.canvas-node-row').forEach(row => {
        const label = row.querySelector('[id^="cn_label_"]')?.value?.trim();
        const x = parseInt(row.querySelector('[id^="cn_x_"]')?.value) || 0;
        const y = parseInt(row.querySelector('[id^="cn_y_"]')?.value) || 0;
        if (label) {
          nodes.push({
            id: 'n' + (row.id || '').replace('canvasNodeRow_', ''),
            rowId: row.id,
            label,
            x,
            y
          });
        }
      });

      const labelToNode = {};
      nodes.forEach(n => {
        labelToNode[n.label] = n;
      });

      // Collect edges
      const edges = [];
      document.querySelectorAll('.canvas-edge-row').forEach(row => {
        const src = row.querySelector('[id^="ce_src_"]')?.value?.trim();
        const tgt = row.querySelector('[id^="ce_tgt_"]')?.value?.trim();
        if (!src || !tgt) return;
        const srcNode = labelToNode[src];
        const tgtNode = labelToNode[tgt];
        if (!srcNode || !tgtNode) return;
        const edge = { srcId: srcNode.id, tgtId: tgtNode.id };
        if (canvasType === 'graph') {
          edge.weight = row.querySelector('[id^="ce_wt_"]')?.value?.trim() || '';
        }
        edges.push(edge);
      });

      if (nodes.length === 0) {
        svg.innerHTML = '';
        if (emptyMsg) emptyMsg.style.display = 'flex';
        return;
      }
      if (emptyMsg) emptyMsg.style.display = 'none';

      // Calculate offset to fit within the preview box with padding
      const padding = 40;
      const nodeR = 28;
      const svgRect = svg.getBoundingClientRect();
      const svgW = svgRect.width || 500;
      const svgH = svgRect.height || 320;

      const minX = Math.min(...nodes.map(n => n.x));
      const minY = Math.min(...nodes.map(n => n.y));
      const maxX = Math.max(...nodes.map(n => n.x));
      const maxY = Math.max(...nodes.map(n => n.y));
      const dataW = (maxX - minX) || 1;
      const dataH = (maxY - minY) || 1;
      const scale = Math.min((svgW - padding * 2) / (dataW + nodeR * 2), (svgH - padding * 2) / (dataH + nodeR * 2), 1.5);

      const offsetX = (svgW - dataW * scale) / 2 - minX * scale;
      const offsetY = (svgH - dataH * scale) / 2 - minY * scale;

      const tx = (n) => n.x * scale + offsetX;
      const ty = (n) => n.y * scale + offsetY;
      const nodeMap = {};
      nodes.forEach(n => nodeMap[n.id] = n);

      let html = '';

      // Arrowhead marker for graph
      if (canvasType === 'graph') {
        html += `<defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#222121">
            <polygon points="0 0, 10 3.5, 0 7" />
          </marker>
        </defs>`;
      }

      // Draw edges
      edges.forEach(e => {
        const src = nodeMap[e.srcId];
        const tgt = nodeMap[e.tgtId];
        if (!src || !tgt) return;

        const x1 = tx(src), y1 = ty(src);
        const x2 = tx(tgt), y2 = ty(tgt);

        // Shorten line so it doesn't overlap circles
        const r = nodeR * scale / 1.5;
        const dx = x2 - x1, dy = y2 - y1;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const sx = x1 + (dx / dist) * r;
        const sy = y1 + (dy / dist) * r;
        const ex = x2 - (dx / dist) * r;
        const ey = y2 - (dy / dist) * r;

        if (canvasType === 'graph') {
          html += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="#222121" stroke-width="1" marker-end="url(#arrowhead)" />`;
          // Weight label
          if (e.weight) {
            const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
            html += `<rect x="${mx - 10}" y="${my - 9}" width="20" height="18" rx="3" fill="white" stroke="#ccc" stroke-width="0.5" />`;
            html += `<text x="${mx}" y="${my + 4}" text-anchor="middle" font-size="11" font-weight="600" fill="#333">${e.weight}</text>`;
          }
        } else {
          html += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="#5D5D5D" stroke-width="2" />`;
        }
      });

      // Draw nodes
      nodes.forEach(n => {
        const cx = tx(n), cy = ty(n);
        const r = nodeR * scale / 1.5;
        html += `<g class="canvas-preview-node" data-row-id="${n.rowId}" data-scale="${scale}">`;
        html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#D9E363" stroke="#5D5D5D" stroke-width="2" />`;
        html += `<text x="${cx}" y="${cy + 1}" text-anchor="middle" dominant-baseline="middle" font-size="${Math.max(11, 14 * scale / 1.5)}" font-weight="700" fill="#222">${n.label}</text>`;
        html += `</g>`;
      });

      svg.innerHTML = html;

      const previewNodes = svg.querySelectorAll('.canvas-preview-node');
      previewNodes.forEach(el => {
        el.style.cursor = 'grab';
        el.addEventListener('mousedown', (event) => {
          const rowId = el.getAttribute('data-row-id');
          const scaleAttr = Number(el.getAttribute('data-scale') || '1');
          if (!rowId) return;

          const row = document.getElementById(rowId);
          if (!row) return;
          const xInput = row.querySelector('[id^="cn_x_"]');
          const yInput = row.querySelector('[id^="cn_y_"]');
          if (!xInput || !yInput) return;

          canvasDragState = {
            rowId,
            startClientX: event.clientX,
            startClientY: event.clientY,
            startX: parseFloat(xInput.value || '0') || 0,
            startY: parseFloat(yInput.value || '0') || 0,
            scale: scaleAttr || 1,
          };
          event.preventDefault();
        });
      });
    }

    window.addEventListener('mousemove', (event) => {
      if (!canvasDragState) return;
      const row = document.getElementById(canvasDragState.rowId);
      if (!row) return;

      const xInput = row.querySelector('[id^="cn_x_"]');
      const yInput = row.querySelector('[id^="cn_y_"]');
      if (!xInput || !yInput) return;

      const dx = (event.clientX - canvasDragState.startClientX) / canvasDragState.scale;
      const dy = (event.clientY - canvasDragState.startClientY) / canvasDragState.scale;

      xInput.value = String(Math.round(canvasDragState.startX + dx));
      yInput.value = String(Math.round(canvasDragState.startY + dy));
      updateCanvasPreview();
    });

    window.addEventListener('mouseup', () => {
      canvasDragState = null;
    });

    function changeOrderItemsCount(change) {
      const newCount = Math.max(2, orderItemsCount + change);
      if (newCount === orderItemsCount) return;

      const container = document.getElementById('orderItemsContainer');
      if (!container) {
        orderItemsCount = newCount;
        render();
        return;
      }

      if (newCount > orderItemsCount) {
        for (let i = orderItemsCount; i < newCount; i++) {
          const div = document.createElement('div');
          div.className = "flex items-center space-x-3";
          div.id = `orderRow_${i}`;
          div.innerHTML = `
            <span class="text-slate-400 font-mono">${i + 1}.</span>
            <input type="text" id="order_${i}" class="input-field" placeholder="Item ${i + 1}">
          `;
          container.appendChild(div);
        }
      } else {
        for (let i = orderItemsCount - 1; i >= newCount; i--) {
          const row = document.getElementById(`orderRow_${i}`);
          if (row) row.remove();
        }
      }
      orderItemsCount = newCount;
    }

    function render() {
      const area = document.getElementById('contentArea');

      if (currentMode === 'bulk') {
        area.innerHTML = `
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Paste JSON Array of ${currentMainTab === 'quiz' ? 'Quizzes' : 'Exercises'}</label>
            <textarea id="bulkData" rows="12" class="input-field font-mono text-sm" placeholder="[\n  { ... }\n]"></textarea>
            <div class="mt-6">
              <button onclick="submitBulk()" class="btn-primary">Submit Batch</button>
            </div>
          </div>
        `;
        return;
      }

      // Single Form Rendering
      if (currentMainTab === 'quiz') {
        // Build Algorithm options
        let algoOptions = "";
        algorithms.forEach(g => {
          algoOptions += `<optgroup label="${g.title}">`;
          g.slugs.forEach(s => {
            algoOptions += `<option value="${s}">${s}</option>`;
          });
          algoOptions += `</optgroup>`;
        });

        area.innerHTML = `
          <div class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Algorithm</label>
                <select id="q_algo" class="input-field">${algoOptions}</select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Type of Quiz</label>
                <select id="q_typeQuiz" class="input-field">
                  <option value="pretest">Pre-Test</option>
                  <option value="posttest">Post-Test</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Question Type</label>
                <select id="q_questionType" class="input-field" onchange="switchQuizType(this.value)">
                  <option value="multiple_choice" ${currentQuizType === 'multiple_choice' ? 'selected' : ''}>Multiple Choice</option>
                  <option value="ordering" ${currentQuizType === 'ordering' ? 'selected' : ''}>Ordering</option>
                  <option value="fill_blank" ${currentQuizType === 'fill_blank' ? 'selected' : ''}>Fill in the Blank</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Title / Question Text</label>
              <input type="text" id="q_title" class="input-field" placeholder="What is the time complexity of...">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Question Image URL (Optional)</label>
              <input type="text" id="q_image" class="input-field" placeholder="https://example.com/image.png">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Question Context (Optional Info/Code View)</label>
              <textarea id="q_desc" rows="2" class="input-field" placeholder="Provide extra description if needed..."></textarea>
            </div>

            ${currentQuizType === 'multiple_choice' ? `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <label class="block text-sm font-medium text-white">Choices (Select correct one with radio)</label>
                
                ${[0, 1, 2, 3].map(i => `
                  <div class="flex items-center space-x-3">
                    <input type="radio" name="correctChoice" value="${i}" ${i === 0 ? 'checked' : ''} class="w-5 h-5 text-indigo-600 bg-slate-700 border-slate-600 focus:ring-indigo-500 focus:ring-2">
                    <input type="text" id="choice_${i}" class="input-field" placeholder="Choice ${i + 1}">
                  </div>
                `).join('')}
              </div>
            ` : currentQuizType === 'fill_blank' ? `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <label class="block text-sm font-medium text-white">Fill in the Blank Answer</label>
                <input type="text" id="fill_answer" class="input-field" placeholder="Correct Answer (e.g. O(n))">
                <p class="text-xs text-slate-400">The user must type exactly this answer (case-insensitive checking usually).</p>
              </div>
            ` : `
              <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
                <div class="flex justify-between items-center">
                  <label class="block text-sm font-medium text-white">Ordering Items (Input in correct order)</label>
                  <div class="space-x-2">
                    <button type="button" onclick="changeOrderItemsCount(-1)" class="text-slate-400 hover:text-white px-2 py-1 bg-slate-700 rounded">-</button>
                    <button type="button" onclick="changeOrderItemsCount(1)" class="text-slate-400 hover:text-white px-2 py-1 bg-slate-700 rounded">+</button>
                  </div>
                </div>

                <div id="orderItemsContainer" class="space-y-4">
                ${Array.from({ length: orderItemsCount }).map((_, i) => `
                  <div class="flex items-center space-x-3" id="orderRow_${i}">
                    <span class="text-slate-400 font-mono">${i + 1}.</span>
                    <input type="text" id="order_${i}" class="input-field" placeholder="Item ${i + 1}">
                  </div>
                `).join('')}
                </div>
                <p class="text-xs text-slate-400">The frontend will display these randomly to users. Your order here is the correct answer.</p>

                <!-- Canvas Data (for tree/graph ordering) -->
                <div class="mt-4 pt-4 border-t border-slate-600">
                  <label class="block text-sm font-medium text-white mb-2">Canvas Type (Optional — for tree/graph visualization)</label>
                  <select id="q_canvasType" class="input-field mb-3">
                    <option value="none">None (drag-and-drop only)</option>
                    <option value="tree">Tree</option>
                    <option value="graph">Graph</option>
                  </select>
                  <div id="canvasDataSection" style="display:none;" class="space-y-4">

                    <!-- Nodes -->
                    <div>
                      <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-medium text-slate-300">Nodes</label>
                        <button type="button" onclick="addCanvasNode()" class="text-indigo-400 hover:text-indigo-300 text-xs font-medium">+ Add Node</button>
                      </div>
                      <div class="text-xs text-slate-500 mb-2">Node ID is auto-generated and stable. Connect edges using node labels in the form fields.</div>
                      <div id="canvasNodesContainer" class="space-y-2"></div>
                    </div>

                    <!-- Edges -->
                    <div>
                      <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-medium text-slate-300">Edges</label>
                        <button type="button" onclick="addCanvasEdge()" class="text-indigo-400 hover:text-indigo-300 text-xs font-medium">+ Add Edge</button>
                      </div>
                      <div id="canvasEdgesContainer" class="space-y-2"></div>
                      <p class="text-xs text-slate-500 mt-1" id="edgeHint">Tree: direction = which side the child is on (left/right of parent)</p>
                    </div>

                    <!-- Visual Preview -->
                    <div class="mt-3">
                      <label class="block text-xs font-medium text-slate-300 mb-2">Preview</label>
                      <div id="canvasVisualPreview" class="w-full rounded-xl border-2 border-slate-600 overflow-hidden bg-white" style="height: 320px; position: relative;">
                        <svg id="canvasPreviewSvg" width="100%" height="100%"></svg>
                        <div id="canvasPreviewEmpty" class="absolute inset-0 flex items-center justify-center text-sm text-slate-400">
                          Add nodes to see preview
                        </div>
                      </div>
                    </div>

                    <!-- JSON Preview (collapsible) -->
                    <details class="mt-2">
                      <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-300">View Raw JSON</summary>
                      <pre id="canvasJsonPreview" class="mt-2 p-3 bg-slate-900 rounded-lg text-xs text-green-400 font-mono overflow-auto max-h-48"></pre>
                    </details>
                  </div>
                </div>
              </div>
            `}

            <div class="mt-6">
              <button onclick="submitSingleQuiz()" class="btn-primary">Add Single Quiz Question</button>
            </div>
          </div>
        `;
        // Attach canvas type toggle for ordering
        if (currentQuizType === 'ordering') {
          setTimeout(() => attachCanvasToggle(), 0);
        }
      } else {
        // Exercise Single Form
        area.innerHTML = `
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
              <input type="text" id="e_title" class="input-field" placeholder="e.g. Find the Middle Node">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Difficulty</label>
                <select id="e_diff" class="input-field">
                  <option value="Easy">Easy</option>
                  <option value="Medium">Medium</option>
                  <option value="Hard">Hard</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
              <textarea id="e_desc" rows="3" class="input-field" placeholder="Describe the problem..."></textarea>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Requirement</label>
              <textarea id="e_req" rows="2" class="input-field" placeholder="What should the function return?"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Example</label>
              <textarea id="e_ex" rows="2" class="input-field font-mono" placeholder="Input: ... Output: ..."></textarea>
            </div>

            <!-- Dynamic Tips Section -->
            <div class="p-4 bg-slate-800 rounded-xl space-y-4 border border-slate-700">
              <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-medium text-white">Tips (Optional)</label>
                <button onclick="addTipField()" type="button" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium">+ Add Tip</button>
              </div>
              <div id="e_tips_container" class="space-y-4">
                <!-- Tips inject here -->
              </div>
              <p class="text-xs text-slate-500">e.g. Hint 1, Pseudo Code, Time Complexity</p>
            </div>

            <div class="mt-6">
              <button onclick="submitSingleExercise()" class="btn-primary">Add Single Exercise</button>
            </div>
          </div>
        `;

        // Auto-add the first tip field so it's ready to use
        addTipField();
      }
    }

    // Handlers
    async function submitSingleQuiz() {
      let questionData = {};

      if (currentQuizType === 'multiple_choice') {
        questionData = {
          choices: [0, 1, 2, 3].map(i => ({ label: document.getElementById(`choice_${i}`).value })),
          correctChoiceIndex: parseInt(document.querySelector('input[name="correctChoice"]:checked').value)
        };
      } else if (currentQuizType === 'fill_blank') {
        questionData = {
          correctAnswer: document.getElementById('fill_answer').value
        };
      } else if (currentQuizType === 'ordering') {
        const items = [];
        const correctOrder = [];
        const seenItemLabels = new Set();
        for (let i = 0; i < orderItemsCount; i++) {
          const val = document.getElementById(`order_${i}`).value.trim();
          if (!val) {
            showToast(`Ordering item ${i + 1} is empty.`, true);
            return;
          }
          if (seenItemLabels.has(val)) {
            showToast(`Duplicate ordering item label: "${val}"`, true);
            return;
          }
          seenItemLabels.add(val);
          items.push({ label: val });
          correctOrder.push({ label: val, position: i });
        }

        // Shuffle the items randomly
        for (let i = items.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }

        questionData = {
          items: items,
          correctOrder: correctOrder
        };

        // Add canvasData if canvas type is selected
        const canvasData = buildCanvasData();
        if (canvasData) {
          if (canvasData.nodes.length === 0) {
            showToast("Canvas requires at least 1 node.", true);
            return;
          }
          if (canvasData._issues?.duplicateNodeLabels?.length) {
            showToast(`Duplicate node label(s): ${canvasData._issues.duplicateNodeLabels.join(', ')}`, true);
            return;
          }
          if (canvasData._issues?.invalidEdges?.length) {
            const invalid = canvasData._issues.invalidEdges[0];
            showToast(`Invalid edge: ${invalid.from} -> ${invalid.to}. Node label not found.`, true);
            return;
          }

          const canvasLabels = new Set(canvasData.nodes.map(n => String(n.data?.label || '').trim()).filter(Boolean));
          for (const item of items) {
            if (!canvasLabels.has(item.label)) {
              showToast(`Ordering item "${item.label}" has no matching canvas node label.`, true);
              return;
            }
          }
          questionData.canvasData = {
            canvasType: canvasData.canvasType,
            nodes: canvasData.nodes,
            edges: canvasData.edges,
          };
        }
      }

      const q = {
        type: currentQuizType,
        algorithm: document.getElementById('q_algo').value,
        typeQuiz: document.getElementById('q_typeQuiz').value,
        title: document.getElementById('q_title').value,
        questionImage: document.getElementById('q_image').value,
        question: questionData
      };

      // Add context if it exists and is supported by backend (desc)
      const desc = document.getElementById('q_desc') ? document.getElementById('q_desc').value : "";
      if (desc) {
        q.description = desc; // Assuming "Q_desc" might map to something, else harmless
      }

      await sendRequest('/quiz/batch', [q]);
    }

    async function submitSingleExercise() {
      // Gather tips
      const tips = [];
      document.querySelectorAll('.tip-item').forEach(item => {
        const label = item.querySelector('.tip-label').value;
        const content = item.querySelector('.tip-content').value;
        if (label || content) {
          tips.push({ label, content });
        }
      });

      if (tips.length === 0) {
        showToast("Please add at least 1 tip.", true);
        return;
      }

      const e = {
        title: document.getElementById('e_title').value,
        difficulty: document.getElementById('e_diff').value,
        description: document.getElementById('e_desc').value,
        requirement: document.getElementById('e_req').value,
        example: document.getElementById('e_ex').value,
        tips: tips
      };

      await sendRequest('/exercise/batch', [e]);
    }

    function addTipField() {
      const container = document.getElementById('e_tips_container');
      const div = document.createElement('div');
      div.className = "tip-item bg-slate-700 p-3 rounded-lg border border-slate-600 relative";
      div.innerHTML = `
        <button onclick="this.parentElement.remove()" type="button" class="absolute top-2 right-2 text-slate-400 hover:text-red-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="space-y-3 mt-4">
          <div>
            <input type="text" class="tip-label input-field !py-1 !text-sm" placeholder="Label (e.g. Hint 1 or Pseudo Code)">
          </div>
          <div>
            <textarea rows="2" class="tip-content input-field !py-1 !text-sm" placeholder="Tip content..."></textarea>
          </div>
        </div>
      `;
      container.appendChild(div);
    }

    async function submitBulk() {
      let data;
      try {
        data = JSON.parse(document.getElementById('bulkData').value);
        if (!Array.isArray(data)) throw new Error("Must be an array");
      } catch (err) {
        showToast("Invalid JSON format. Must be an array.", true);
        return;
      }

      const endpoint = currentMainTab === 'quiz' ? '/quiz/batch' : '/exercise/batch';
      await sendRequest(endpoint, data);
    }

    async function sendRequest(path, data) {
      try {
        const res = await fetch(API_BASE + path, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + AUTH_TOKEN
          },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }

        showToast("Success! Data inserted.");
        
        // Clear all text inputs and textareas after success
        const area = document.getElementById('contentArea');
        if (area) {
          const inputs = area.querySelectorAll('input[type="text"], textarea');
          inputs.forEach(input => input.value = '');
          
          // Reset multiple-choice radio button to default (first choice)
          const radios = area.querySelectorAll('input[type="radio"]');
          if (radios.length > 0) {
            radios[0].checked = true;
          }
        }
      } catch (err) {
        showToast("Error: " + err.message, true);
        console.error(err);
      }
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;

      if (isError) {
        toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium z-50";
      } else {
        toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium z-50";
      }

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        // Reset classes after animation
        setTimeout(() => toast.className = "fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg font-medium pointer-events-none z-50", 300);
      }, 3000);
    }
  </script>
</body>
